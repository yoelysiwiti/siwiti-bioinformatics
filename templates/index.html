<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNA to Protein Translator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="{{ url_for('static', filename='dna_pro.js') }}" defer></script>

</head>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: white;
        transition: background 0.3s, color 0.3s;
    }

    /* ===== Navbar ===== */
    .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 20px;
        background: #1e293b;
    }

    .logo {
        font-size: 20px;
        font-weight: bold;
    }

    .menu-btn {
        font-size: 24px;
        cursor: pointer;
    }

    .dropdown {
        position: absolute;
        right: 20px;
        top: 60px;
        background: #1e293b;
        border-radius: 8px;
        display: none;
        flex-direction: column;
        min-width: 150px;
    }

    .dropdown a {
        padding: 10px;
        text-decoration: none;
        color: white;
        border-bottom: 1px solid #334155;
    }

    .dropdown a:hover {
        background: #334155;
    }

    #themeBtn {
        background: none;
        border: none;
        font-size: 20px;
        cursor: pointer;
        color: white;
        margin-left: 10px;
    }

    /* ===== Header ===== */
    .header {
        text-align: center;
        padding: 40px 20px;
    }

    .header p {
        color: #94a3b8;
    }

    /* ===== GC Container ===== */
    .gc-container {
        max-width: 500px;
        margin: 40px auto;
        background: #1e293b;
        padding: 25px;
        border-radius: 12px;
        text-align: center;
        height: 400px;
    }

    .gc-container textarea {
        width: 100%;
        height: 120px;
        padding: 10px;
        border-radius: 8px;
        border: none;
        resize: none;
        margin-bottom: 15px;
    }


    .gc-container button {
        padding: 10px 20px;
        background: #38bdf8;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    .gc-container button:hover {
        background: #0ea5e9;
    }

    .gc-container .result {
        background: #040f3dde;
        border-radius: 7px;
        min-height: 70px;
        padding: 5px;
    }

    /* ===== Footer ===== */
    footer {
        text-align: center;
        background: #020617;
        color: #94a3b8;
        font-size: 14px;
        height: 100px;
        padding: 10px 0;
    }

    .footer-content {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 100px;
        flex-wrap: wrap;
    }

    .contact,
    .socials {
        text-align: left;
    }

    .socials {
        text-align: right;
    }

    .socials a {
        margin: 0 10px;
        font-size: 20px;
        color: #94a3b8;
        transition: 0.3s;
    }

    .socials a:hover {
        color: #38bdf8;
    }

    .contact p,
    .contact h4,
    .socials h4 {
        margin: 5px 0;
    }

    .footer-content h4 {
        margin-bottom: 8px;
        font-size: 16px;
        color: white;
    }

    /* ===== Light Mode ===== */
    .light-mode {
        background: #f8fafc;
        color: #0f172a;
    }

    .light-mode .navbar,
    .light-mode footer {
        background: white;
        color: #0f172a;
        border-bottom: 1px solid #e2e8f0;
    }

    .light-mode .gc-container {
        background: white;
        color: #0f172a;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
    }

    .light-mode .gc-container button:hover {
        background: #38bdf8;
    }

    .light-mode .contact,
    .light-mode .footer-content h4 {
        color: #0f172a;
    }

    .light-mode .socials a {
        color: #0f172a;
    }
</style>

<body>

    <!-- Navbar -->
    <div class="navbar">
        <div class="logo">🧬 Bio Toolkit</div>
        <div>
            <button onclick="toggleTheme()" id="themeBtn">🌙</button>
            <span class="menu-btn" onclick="toggleMenu()">☰</span>
        </div>
    </div>

    <div class="dropdown" id="menu">
        <a href="index.html">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
        <a href="login.html">Login</a>
        <a href="developer.html">Developer</a>
    </div>
    <!-- GC Calculator Form -->


    <div class="gc-container">
        <form id="myForm">
            <label>DNA - PROTEIN<br> Enter DNA Sequence:</label><br>
            <textarea name="user_input" id="user_input" placeholder="Paste DNA sequence..."></textarea>

            <br><br>

            <label>Or upload a file:</label><br>

            <input type="file" name="sequence_file" id="sequence_file" accept=".txt,.fasta,.fa">

            <br><br>
            <button type="submit">Submit</button>
        </form>

        <div id="result" class="result">
            <div id="sliding-windows"></div> <!-- New: Bars for each window -->
            <div id="overall-gc"></div> <!-- Overall GC -->
        </div>
    </div>
    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <div class="contact">
                <h4>Contact</h4>
                <p><i class="fas fa-envelope"></i> your@email.com</p>
                <p><i class="fas fa-phone"></i> +255 700 000 000</p>
            </div>

            <div class="socials">
                <h4>Follow Us</h4>
                <a href="#"><i class="fab fa-facebook"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
            </div>
        </div>
    </footer>


</body>

</html>
